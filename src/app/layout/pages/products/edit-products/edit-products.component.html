<h1>Product Over view</h1>
<div class="row">
    <div class="col-12 grid-margin" >
        <div class="card">
        <div class="card-body">
            <h2 class="card-title">Product Details</h2>
            <form [formGroup]="form" (ngSubmit)="submit()">
                    <app-product-image-edit
  [images]="product.images"
  [mainIndex]="product.main_image_index"
  (mainChanged)="updateMainImage($event)"
  (imageDeleted)="deleteImage($event)"
  (imagesAdded)="uploadNewImages($event)"
></app-product-image-edit>

            </form>
</div>
